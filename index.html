<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoldGradient — a custom Paper shader</title>
    <style>
      @font-face {
        font-family: 'Inter';
        src: url('/fonts/InterVariable.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      html, body, #root { height: 100%; margin: 0; background: #0a0a0b; }
      /* keep #root's stacking self-contained so portaled UI (toasts) paints above it */
      #root { isolation: isolate; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01'; /* Inter's open digits/alt glyphs */
        -webkit-font-smoothing: antialiased;
      }
      *, *::before, *::after { box-sizing: border-box; }
      /* pulse ring on the DialKit trigger while the panel is minimized */
      .dialkit-panel-inner[data-collapsed='true'] { position: relative; }
      .dialkit-panel-inner[data-collapsed='true']::after {
        content: ''; position: absolute; inset: -1px; border-radius: 50%;
        pointer-events: none;
        animation: dialkit-pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes dialkit-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.35); }
        70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
        100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .dialkit-panel-inner[data-collapsed='true']::after { animation: none; }
      }
      .shiki { margin: 0; padding: 12px 16px; background: rgba(16,16,18,0.9) !important; font-family: 'SF Mono', ui-monospace, Menlo, monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
