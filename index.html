<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoldGradient — a custom Paper shader</title>
    <meta name="description" content="Soft, flowing sheets of light for your next hero section. A custom Paper shader inspired by Raycast's wallpapers. Nothing to install: copy the shader and drop it into your React app." />
    <!-- Open Graph / unfurls -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FoldGradient" />
    <meta property="og:title" content="FoldGradient — a custom Paper shader" />
    <meta property="og:description" content="Soft, flowing sheets of light for your next hero section. Copy the shader and drop it into your React app." />
    <meta property="og:url" content="https://foldgradient.mattrothenberg.com/" />
    <meta property="og:image" content="https://foldgradient.mattrothenberg.com/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="675" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FoldGradient — a custom Paper shader" />
    <meta name="twitter:description" content="Soft, flowing sheets of light for your next hero section. Copy the shader and drop it into your React app." />
    <meta name="twitter:image" content="https://foldgradient.mattrothenberg.com/og.jpg" />
    <style>
      @font-face {
        font-family: 'Inter';
        src: url('/fonts/InterVariable.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      html, body, #root { height: 100%; margin: 0; background: #0a0a0b; }
      /* keep #root's stacking self-contained so portaled UI (toasts) paints above it */
      #root { isolation: isolate; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01'; /* Inter's open digits/alt glyphs */
        -webkit-font-smoothing: antialiased;
      }
      *, *::before, *::after { box-sizing: border-box; }
      /* pulse ring on the DialKit trigger while the panel is minimized */
      .dialkit-panel-inner[data-collapsed='true'] {
        animation: dialkit-pulse 3.6s ease-in-out infinite;
      }
      @keyframes dialkit-pulse {
        0%, 100% { outline: 1px solid rgba(255,255,255,0); outline-offset: 3px; }
        50%      { outline: 1px solid rgba(255,255,255,0.12); outline-offset: 3px; }
      }
      /* hide DialKit's preset/"Version" UI — we manage presets via our own select */
      .dialkit-preset-manager,
      .dialkit-toolbar-add[title='Add preset'] { display: none; }
      @media (prefers-reduced-motion: reduce) {
        .dialkit-panel-inner[data-collapsed='true'] { animation: none; }
      }
      .shiki { margin: 0; padding: 12px 16px; background: rgba(16,16,18,0.9) !important; font-family: 'SF Mono', ui-monospace, Menlo, monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
